<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Data Form</title>
    <style>
        :root {
            --max-width-container: 500px;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            margin: 100px;
            padding: 0 auto;
        }
        .container {
            max-width: var(--max-width-container);
            margin: 0 auto;
            margin-bottom: 50px;
            padding: 10px;
            background-color: #dcdce6;
            border-radius: 50px;
            box-shadow: 5px 40px 20px rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            display: block;
            margin-bottom: 5px;
            margin-top: 20px;
        }
        input[type="text"],
        input[type="date"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-left: 50px;
            margin-bottom: 20px;
            max-width: 500px;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 30px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: calc((var(--max-width-container) / 2) - 30px);
            margin-bottom: 50px;
        }
        textarea[id="user_comment"] {
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-left: 50px;
            margin-bottom: 20px;
            max-width: 500px;
            max-height: 200px;
        }
        h1.white {
            margin-top: 100px;
        }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column;">
        <div class="container" >
            <h1 class="white">Visitors Data</h1>
        </div>
        <div class="container">
            <h1>Enter Visitor Data</h1>
            <form action="save_data.php" method="post">
		    <label for="user_name">User Name</label>
                <input type="text" id="user_name" name="user_name" required>
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name" name="first_name" required>
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" name="last_name" required>
                <label>Gender:</label>
                <input type="radio" id="male" name="gender" value="Male" required label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="Female" label for="female">Female</label>
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required>
                <label for="user_comment">Write your comment:</label>
                <textarea id="user_comment" name="user_comment" rows="4" cols="50"></textarea>
                <input type="submit" value="Submit">
            </form>
        </div>
        <div class="container">
            <h1>Search Visitor Data</h1>
            <form action="search_data.php" method="get">
                <input type="text" name="search" placeholder="Search by User Name">
                <input type="submit" value="Search">
            </form>
        </div>
    </div>
</body>
</html>
