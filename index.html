<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Data Form</title>
    <style>
	:root 
	{
            --max-width-container: 500px;
	}
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 100px;
            padding: 0 auto;
        }
        .container {
            max-width: var(--max-width-container);
            margin: 0 auto;
	    margin-bottom: 50px;
            padding: 10px;
            background-color: #fff;
            border-radius: 50px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-bottom: 5px;
	    margin-top: 20px;
        }
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
	    margin-Left: 50px;
	    margin-bottom: 20px;
	    max-width: calc(var(--max-width-container) - 100px);
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 30px;
            border-radius: 3px;
            cursor: pointer;
	    margin-left: calc((var(--max-width-container) / 2) - 30px);
	    margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <body style="display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column;">
	<h1>Visitor Data</h1>

    <div class="container">
        <h1>Enter Visitor Data</h1>
        <form action="save_data.php" method="post">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" required>
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" required>
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="Male" required label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="Female" label for="female">Female</label>            
            <label for="dob">Date of Birth:</label>
 	    <input type="date" id="dob" name="dob" required>
	    <input type="submit" value="Submit">
        </form>
    </div>
    <div class="container">
	<h1>Search Visitor Data</h1>
            <form action="search_data.php" method="get">
            <input type="text" name="search" placeholder="Search by name, job, or country">
            <input type="submit" value="Search">
        </form>
    </div>
</body>
</html>
